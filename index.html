<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapar Limones</title>
    <link rel="stylesheet" href="limones.css">
</head>

<body onload="dibujarIniciar()">

    <div class="contenedor">

        <header class="cabecera">
            <h1>🍋 Atrapar Limones</h1>
            <p>¡Si del cielo te caen limones... atrápalos todos!</p>
            <h2>Autor: Madelaine</h2>
        </header>

        <div class="juego">

            <canvas id="areaJuego" width="600" height="400"></canvas>

            <div class="panel">

                <div class="tarjeta">
                    <h3>Puntaje</h3>
                    <span id="txtPuntaje">0</span>
                </div>

                <div class="tarjeta">
                    <h3>Vidas</h3>
                    <span id="txtvidas">3</span>
                </div>

            </div>

            <div class="botones">

                <button onclick="moverIzquierda()">⬅ Izquierda</button>

                <button onclick="moverDerecha()">Derecha ➡</button>

                <button onclick="reiniciar()">🔄 Reiniciar</button>

                <button onclick="desaparecerPersonaje()">👻 Desaparecer</button>

            </div>

        </div>

    </div>

    <script src="limones.js"></script>
    <script src="util.js"></script>

</body>
</html>
